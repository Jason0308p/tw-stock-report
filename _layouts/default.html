<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<!-- Google tag (gtag.js) -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #090f1c;
  --surface:  #0f1828;
  --card:     #182338;
  --card2:    #1e2d47;
  --border:   #2a3d57;
  --accent:   #e63946;
  --accent2:  #ff6b6b;
  --bull:     #ef4444;
  --bear:     #22c55e;
  --neutral:  #94a3b8;
  --gold:     #f59e0b;
  --blue:     #60a5fa;
  --text:     #edf2f7;
  --text2:    #a8b8cc;
  --text3:    #7a8ea8;
  --radius:   10px;
  --shadow:   0 4px 24px rgba(0,0,0,.35);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter','Noto Sans TC',system-ui,sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 14px; line-height: 1.7; min-height: 100vh;
}

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(11,15,25,.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-brand {
  font-size: 16px; font-weight: 700; color: var(--text);
  text-decoration: none; letter-spacing: -.3px;
  display: flex; align-items: center; gap: 8px;
}
.nav-brand span { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 4px; }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  color: var(--text2); text-decoration: none; font-size: 13px;
  padding: 5px 12px; border-radius: 6px; transition: all .15s;
}
.nav-links a:hover { background: var(--card); color: var(--text); }
@media (max-width: 640px) { .nav-links { display: none; } }

/* ── PAGE HEADER ── */
.page-hero {
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
  border-bottom: 1px solid var(--border);
  padding: 48px 24px 40px; text-align: center;
  position: relative; overflow: hidden;
}
.page-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(230,57,70,.12) 0%, transparent 70%);
}
.hero-date {
  display: inline-block; font-size: 12px; font-weight: 600;
  color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase;
  background: rgba(230,57,70,.1); border: 1px solid rgba(230,57,70,.3);
  padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
}
.hero-title {
  font-size: clamp(24px,4vw,36px); font-weight: 700;
  color: #fff; letter-spacing: -.5px; line-height: 1.2;
}
.hero-sub { color: var(--text2); font-size: 13px; margin-top: 8px; }

/* ── LAYOUT ── */
.container { max-width: 960px; margin: 0 auto; padding: 32px 20px 64px; }

/* ── CONTENT SECTIONS ── */
.content h2 {
  font-size: 19px; font-weight: 700; color: #f1f5f9;
  margin: 40px 0 18px;
  padding: 15px 18px 15px 22px;
  background: var(--card);
  border-left: 4px solid var(--accent);
  border-radius: 0 var(--radius) var(--radius) 0;
  letter-spacing: -.3px;
  text-shadow: 0 1px 4px rgba(0,0,0,.3);
}
.content h2:first-child { margin-top: 0; }
.content h3 {
  font-size: 17px; font-weight: 700; color: #e2e8f0;
  margin: 30px 0 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  letter-spacing: -.2px;
}
.content h4 {
  font-size: 15px; font-weight: 600; color: #cbd5e1;
  margin: 22px 0 10px; display: flex; align-items: center; gap: 8px;
}
.content h4::before {
  content: ''; display: block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--accent); flex-shrink: 0;
}
.content p { color: var(--text2); margin: 8px 0; }
.content em { color: var(--text3); font-style: normal; font-size: 12px; }
.content hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
.content a { color: var(--blue); text-decoration: none; }
.content a:hover { text-decoration: underline; }
.content code {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  background: var(--card2); color: var(--gold);
  padding: 2px 6px; border-radius: 4px;
}

/* ── TABLES ── */
.content table {
  width: 100%; border-collapse: collapse; margin: 12px 0 20px;
  background: var(--card); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow);
  font-size: 13px;
}
.content thead tr { background: var(--card2); }
.content th {
  padding: 11px 14px; text-align: left; font-weight: 700;
  color: #94a3b8; font-size: 12px; letter-spacing: .6px;
  text-transform: uppercase; white-space: nowrap;
}
.content td {
  padding: 10px 14px; border-top: 1px solid var(--border);
  color: #dde4ee; vertical-align: middle;
}
.content tbody tr:hover { background: var(--card2); }

/* ── BLOCKQUOTE (貼文引用) ── */
.content blockquote {
  background: var(--card); border-left: 3px solid var(--border);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 10px 16px; margin: 6px 0;
  font-size: 13px; color: var(--text2); line-height: 1.6;
}
.content blockquote a { color: var(--blue); font-size: 12px; }

/* ── SENTIMENT ── */
.bull  { color: var(--bull)  !important; font-weight: 700; }
.bear  { color: var(--bear)  !important; font-weight: 700; }
.neu   { color: var(--neutral)!important; }
.score-bull { color: var(--bull); font-weight: 600; font-family: 'JetBrains Mono',monospace; }
.score-bear { color: var(--bear); font-weight: 600; font-family: 'JetBrains Mono',monospace; }
.score-neu  { color: var(--neutral); font-family: 'JetBrains Mono',monospace; }

/* ── STATUS BADGES ── */
.badge {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; white-space: nowrap;
}
.badge-ok      { background: rgba(34,197,94,.15); color: #4ade80; }
.badge-warn    { background: rgba(245,158,11,.15); color: #fbbf24; }
.badge-blocked { background: rgba(239,68,68,.15);  color: #f87171; }
.badge-lock    { background: rgba(148,163,184,.1); color: var(--neutral); }

/* ── ARCHIVE INDEX ── */
.report-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.report-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  transition: all .15s; text-decoration: none;
}
.report-item:hover {
  border-color: var(--accent); background: var(--card2);
  transform: translateX(4px);
}
.report-item-date { font-size: 15px; font-weight: 600; color: var(--text); }
.report-item-label {
  font-size: 12px; color: var(--text3);
  background: var(--card2); padding: 4px 10px; border-radius: 6px;
}
.latest-badge {
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
  background: var(--accent); color: #fff;
  padding: 2px 8px; border-radius: 20px; margin-left: 10px;
}

/* ── NAV PAGINATION ── */
.page-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; background: var(--card); border-radius: var(--radius);
  margin-bottom: 24px; border: 1px solid var(--border);
  font-size: 13px;
}
.page-nav a {
  color: var(--text2); text-decoration: none; font-weight: 500;
  padding: 6px 14px; border-radius: 6px; background: var(--card2);
  transition: all .15s;
}
.page-nav a:hover { background: var(--border); color: var(--text); }
.page-nav-center { color: var(--text2); font-size: 15px; font-weight: 600; }

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border); padding: 24px;
  text-align: center; color: var(--text3); font-size: 12px;
}
footer a { color: var(--text3); }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .container { padding: 20px 16px 48px; }
  .content table { font-size: 12px; }
  .content th, .content td { padding: 7px 10px; }
}

/* ── SOURCE PANEL ── */
#src-toggle-btn {
  background: rgba(230,57,70,.12); border: 1px solid rgba(230,57,70,.35);
  color: #e63946; border-radius: 6px; padding: 5px 12px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  font-family: inherit; transition: all .15s;
}
#src-toggle-btn:hover, #src-toggle-btn.active {
  background: rgba(230,57,70,.22); border-color: rgba(230,57,70,.6);
}
#src-panel {
  display: none; position: fixed; top: 56px; right: 12px; z-index: 199;
  width: min(520px, calc(100vw - 24px)); max-height: 76vh; overflow-y: auto;
  background: #182338; border: 1px solid #2a3d57; border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,.6); font-size: 13px; color: #edf2f7;
}
#src-panel.open { display: block; }
.sp-head {
  position: sticky; top: 0; background: #1e2d47;
  border-bottom: 1px solid #2a3d57; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-radius: 12px 12px 0 0; z-index: 1;
}
.sp-tbl { width: 100%; border-collapse: collapse; }
.sp-tbl th {
  background: #1e2d47; padding: 8px 12px; text-align: left;
  font-size: 11px; font-weight: 700; color: #7a8ea8;
  letter-spacing: .6px; text-transform: uppercase;
  white-space: nowrap; border-bottom: 1px solid #2a3d57;
}
.sp-tbl td {
  padding: 7px 12px; border-bottom: 1px solid rgba(42,61,87,.5);
  color: #dde4ee; vertical-align: middle;
}
.sp-tbl tr:hover td { background: rgba(30,45,71,.6); }
.sp-cat { color: #60a5fa; font-weight: 600; font-size: 12px; white-space: nowrap; vertical-align: top; padding-top: 10px !important; }
.sp-cnt { font-family: 'JetBrains Mono',monospace; font-weight: 600; color: #a8b8cc; text-align: right; white-space: nowrap; }
.sp-date { color: #7a8ea8; font-size: 11px; white-space: nowrap; }
.sp-foot {
  position: sticky; bottom: 0; background: #1e2d47;
  border-top: 1px solid #2a3d57; padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-radius: 0 0 12px 12px; font-size: 12px; color: #a8b8cc;
}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="{{ '/' | relative_url }}">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    台股輿情<span>分析</span>
  </a>
  <div class="nav-right">
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}">報告列表</a>
      <a href="https://github.com/{{ site.github_username | default: '' }}" target="_blank" rel="noopener noreferrer">GitHub</a>
    </div>
    <a href="{{ '/reports/rwd-preview.html' | relative_url }}"
       style="display:inline-flex;align-items:center;gap:6px;padding:6px 13px;
              border-radius:6px;background:rgba(245,158,11,.18);border:1.5px solid rgba(245,158,11,.6);
              color:#f59e0b;font-size:13px;font-weight:700;text-decoration:none;transition:all .15s;
              box-shadow:0 0 10px rgba(245,158,11,.15)"
       onmouseover="this.style.background='rgba(245,158,11,.3)';this.style.boxShadow='0 0 16px rgba(245,158,11,.3)'"
       onmouseout="this.style.background='rgba(245,158,11,.18)';this.style.boxShadow='0 0 10px rgba(245,158,11,.15)'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
      點此前往測試版
    </a>
    <button id="src-toggle-btn" aria-label="資料來源">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v6c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 11v6c0 1.66 4.03 3 9 3s9-1.34 9-3v-6"/></svg>
      來源
    </button>
  </div>
</nav>

<div id="src-panel">
  <div class="sp-head">
    <span style="font-weight:700;font-size:14px">📡 資料來源總覽</span>
    <span style="color:#7a8ea8;font-size:12px" id="sp-gen-at"></span>
  </div>
  <table class="sp-tbl">
    <thead><tr>
      <th>類別</th><th>來源</th>
      <th style="text-align:right">近30天</th><th>最後更新</th>
    </tr></thead>
    <tbody id="sp-body"></tbody>
  </table>
  <div class="sp-foot">
    <span id="sp-foot-l"></span>
    <span id="sp-foot-r"></span>
  </div>
</div>

{% if page.is_index %}
<div class="page-hero">
  <div class="hero-date">DAILY REPORT</div>
  <h1 class="hero-title">台股輿情日報</h1>
  <p class="hero-sub">自動化爬蟲 × Claude AI 每日分析台股社群情緒</p>
</div>
{% else %}
<div class="page-hero">
  <div class="hero-date">{{ page.report_date | default: page.title }}</div>
  <h1 class="hero-title">台股輿情日報</h1>
  <p class="hero-sub">社群情緒分析 · 多平台輿情追蹤</p>
</div>
{% endif %}

<div class="container">
  <div class="content">
    {{ content }}
  </div>
</div>

<footer>
  <p>台股輿情系統 · 自動化爬蟲 + Claude AI 分析 · 僅供參考，不構成投資建議</p>
</footer>

<script>
// 把 Markdown 轉出來的 emoji 換成有 CSS class 的 span
document.querySelectorAll('.content').forEach(el => {
  /*
  el.innerHTML = el.innerHTML
    // 情緒符號
    .replace(/🔴/g, '<span class="bull">▲</span>')
    .replace(/🟢/g, '<span class="bear">▼</span>')
    .replace(/⚪/g,  '<span class="neu">—</span>')
    // 趨勢箭頭
    .replace(/🔼 \+(\d+)/g, '<span class="score-bull">↑+$1</span>')
    .replace(/🔽 (-\d+)/g,  '<span class="score-bear">↓$1</span>')
    .replace(/➡ ([+\-]?\d+)/g,'<span class="score-neu">→$1</span>')
    // 分數 badge
    .replace(/分=(\d+)/g, (_, n) => {
      const v = parseInt(n);
      const cls = v >= 62 ? 'score-bull' : v <= 42 ? 'score-bear' : 'score-neu';
      return `<span class="${cls}">分=${n}</span>`;
    })
    // 狀態標籤
    .replace(/✅/g, '<span class="badge badge-ok">● 正常</span>')
    .replace(/🚫 封鎖/g, '<span class="badge badge-blocked">✕ 封鎖</span>')
    .replace(/⚠️ 限速/g, '<span class="badge badge-warn">! 限速</span>')
    .replace(/🔐 需Token/g, '<span class="badge badge-lock">🔑 需Token</span>');
  */
});

// 把 table 加 wrapper 讓手機可以橫向捲動
document.querySelectorAll('.content table').forEach(t => {
  const w = document.createElement('div');
  w.style.cssText = 'overflow-x:auto;-webkit-overflow-scrolling:touch;margin:12px 0';
  t.parentNode.insertBefore(w, t);
  w.appendChild(t);
});

// ── 資料來源面板 ──────────────────────────────────────────
(function () {
  const btn   = document.getElementById('src-toggle-btn');
  const panel = document.getElementById('src-panel');
  if (!btn || !panel) return;

  let rendered = false;

  function fmt(s) {
    if (!s) return '—';
    // "2026-05-25T10:24:12.xxx+00:00" → "05-25 10:24"
    return s.replace('T', ' ').substring(5, 16);
  }

  function renderPanel() {
    if (rendered || !window.SOURCE_DATA) return;
    const d = window.SOURCE_DATA;
    document.getElementById('sp-gen-at').textContent = '更新：' + d.generated_at;

    const rows = [];
    d.categories.forEach(cat => {
      cat.sources.forEach((src, i) => {
        const catTd = i === 0
          ? `<td class="sp-cat" rowspan="${cat.sources.length}">${cat.label}</td>`
          : '';
        const cnt = (src.posts || 0).toLocaleString();
        rows.push(
          `<tr>${catTd}` +
          `<td>${src.name}</td>` +
          `<td class="sp-cnt">${cnt}</td>` +
          `<td class="sp-date">${fmt(src.last_fetch)}</td>` +
          `</tr>`
        );
      });
    });
    document.getElementById('sp-body').innerHTML = rows.join('');
    document.getElementById('sp-foot-l').textContent =
      '近30天共 ' + d.total_posts.toLocaleString() + ' 篇';
    document.getElementById('sp-foot-r').textContent =
      d.total_sources + ' 個來源';
    rendered = true;
  }

  btn.addEventListener('click', e => {
    e.stopPropagation();
    const open = panel.classList.toggle('open');
    btn.classList.toggle('active', open);
    if (open) renderPanel();
  });

  document.addEventListener('click', e => {
    if (!panel.contains(e.target) && e.target !== btn) {
      panel.classList.remove('open');
      btn.classList.remove('active');
    }
  });
})();
</script>
</body>
</html>
